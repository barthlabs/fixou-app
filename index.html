<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e40af">
  <title>fixou.app — Gestão de manutenção</title>
  <meta name="description" content="Plataforma SaaS multi-tenant de gestão de manutenção para lojas, condomínios, clubes e mais.">

  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/style.css?v=0.1.0">
  <link rel="stylesheet" href="css/responsive.css?v=0.1.0">

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>
  <!-- Topbar -->
  <header id="topbar" class="topbar" role="banner" hidden>
    <div class="topbar-inner">
      <a href="#dashboard" class="topbar-logo" aria-label="fixou.app — início">
        <span class="logo-icon">🔧</span>
        <span class="logo-text">fixou.app</span>
      </a>

      <div class="topbar-org" id="topbar-org" hidden>
        <button id="org-switcher-btn" class="org-switcher" aria-label="Trocar organização">
          <span id="org-current-name">—</span>
          <span class="caret">▾</span>
        </button>
      </div>

      <nav class="topbar-nav" aria-label="Navegação principal">
        <button class="topbar-btn" id="nav-dashboard" aria-label="Painel">📊</button>
        <button class="topbar-btn" id="nav-providers" aria-label="Prestadores">🛠️</button>
        <button class="topbar-btn" id="nav-profile" aria-label="Perfil">
          <img id="topbar-avatar" class="topbar-avatar" alt="" hidden>
          <span id="topbar-avatar-fallback">👤</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main view container -->
  <main id="view-container" class="view-container" role="main">
    <!-- Splash inicial enquanto Firebase carrega -->
    <div id="splash" class="splash">
      <div class="splash-inner">
        <span class="splash-icon">🔧</span>
        <h1 class="splash-title">fixou.app</h1>
        <p class="splash-subtitle">Carregando…</p>
      </div>
    </div>
  </main>

  <!-- Global notification toast container -->
  <div id="notification-container" class="notification-container" aria-live="polite"></div>

  <!-- App scripts -->
  <script src="js/firebase-config.js?v=0.1.0"></script>
  <script src="js/ui.js?v=0.1.0"></script>
  <script src="js/store.js?v=0.1.5"></script>
  <script src="js/auth.js?v=0.1.0"></script>
  <script src="js/router.js?v=0.1.0"></script>

  <!-- Views -->
  <script src="js/views/login.js?v=0.1.0"></script>
  <script src="js/views/onboarding.js?v=0.1.0"></script>
  <script src="js/views/dashboard.js?v=0.1.4"></script>
  <script src="js/views/ticket.js?v=0.1.0"></script>
  <script src="js/views/admin.js?v=0.1.0"></script>
  <script src="js/views/providers.js?v=0.1.0"></script>
  <script src="js/views/profile.js?v=0.1.0"></script>

  <!-- Bootstrap -->
  <script src="js/main.js?v=0.1.4"></script>
</body>
</html>
